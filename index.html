<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabMaster - Hệ Thống Ôn Tập Từ Vựng</title>

    <!-- 1. Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- 2. Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 3. Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
                        }
                    }
                }
            }
        }
    </script>

    <!-- 4. Custom App CSS -->
    <link rel="stylesheet" href="src/styles/app.css">

    <!-- 5. React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- 6. Babel (for transforming JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ========================================== -->
    <!-- VOCABULARY DATA & MANIFEST                 -->
    <!-- The manifest script loads the lesson files -->
    <!-- ========================================== -->
    <script src="src/data/manifest.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 antialiased overflow-x-hidden selection:bg-brand-200 dark:selection:bg-brand-900">
    <div id="root"></div>

    <!-- Hỗ trợ xử lý sự kiện nạp dữ liệu xong -->
    <script>
        // Khi tất cả các file trong manifest.js load xong (vì dùng document.write tuần tự)
        // trình duyệt sẽ tự động chạy lệnh này để báo hiệu cho React.
        window.dispatchEvent(new Event('lessonsReady'));
    </script>

    <!-- ========================================== -->
    <!-- REACT COMPONENTS (Loaded via Babel)        -->
    <!-- ========================================== -->
    <script type="text/babel" src="src/components/FlashcardSection.jsx"></script>
    <script type="text/babel" src="src/components/MatchingSection.jsx"></script>
    <script type="text/babel" src="src/components/QuizSection.jsx"></script>
    <script type="text/babel" src="src/components/Sidebar.jsx"></script>
    <script type="text/babel" src="src/components/Header.jsx"></script>
    <script type="text/babel" src="src/components/TabNav.jsx"></script>
    <script type="text/babel" src="src/App.jsx"></script>
    <script type="text/babel" src="src/main.jsx"></script>
</body>
</html>
