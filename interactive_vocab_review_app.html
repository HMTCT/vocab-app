        function App() {

        // PHẦN 1: FLASHCARDS ÔN TẬP TỪ VỰNG
        function FlashcardSection({ words }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            // Đảm bảo Reset index về 0 khi chuyển đổi Unit mới
            useEffect(() => {
                setCurrentIndex(0);
                setIsFlipped(false);
            }, [words]);

            const currentWord = words[currentIndex] || { en: "", vi: "", type: "" };

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % words.length);
                }, 150);
            };

            const handlePrev = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev - 1 + words.length) % words.length);
                }, 150);
            };

            const handleSpeak = (e) => {
                e.stopPropagation(); // Không kích hoạt lật thẻ khi ấn nút loa
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(currentWord.en);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === "ArrowRight") handleNext();
                if (e.key === "ArrowLeft") handlePrev();
                if (e.key === " " || e.key === "Enter") setIsFlipped(!isFlipped);
            };

            // Gán phím tắt mũi tên trái/phải để chuyển thẻ
            useEffect(() => {
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [currentIndex, isFlipped, words]);

            return (
                <div className="w-full max-w-2xl mx-auto flex flex-col items-center py-6">
                    {/* Hướng dẫn sử dụng */}
                    <div className="text-center mb-6">
                        <span className="bg-brand-50 dark:bg-brand-950 text-brand-700 dark:text-brand-300 text-xs px-3 py-1.5 rounded-full font-semibold">
                            Mẹo: Click vào thẻ để lật hoặc dùng Phím Mũi Tên Trái/Phải, Phím Cách
                        </span>
                    </div>

                    {/* Khung chứa Flashcard lật 3D */}
                    <div 
                        onClick={() => setIsFlipped(!isFlipped)}
                        className="w-full h-80 sm:h-96 perspective-1000 cursor-pointer group"
                    >
                        <div className={`w-full h-full relative transform-style-3d transition-transform duration-500 ease-out ${isFlipped ? "rotate-y-180" : ""}`}>
                            
                            {/* MẶT TRƯỚC: TIẾNG ANH */}
                            <div className="absolute inset-0 bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-xl border border-slate-100 dark:border-slate-700 flex flex-col justify-between backface-hidden">
                                <div className="flex justify-between items-center w-full">
                                    <span className="text-sm font-bold tracking-widest text-slate-400 dark:text-slate-500 uppercase">MẶT TRƯỚC</span>
                                    {currentWord.type && (
                                        <span className="bg-brand-50 dark:bg-brand-900/40 text-brand-600 dark:text-brand-300 text-xs font-bold px-2.5 py-1 rounded-md lowercase">
                                            ({currentWord.type})
                                        </span>
                                    )}
                                </div>

                                <div className="text-center my-auto flex flex-col items-center gap-4">
                                    <h3 className="text-3xl sm:text-4xl md:text-5xl font-extrabold text-slate-800 dark:text-white tracking-tight word-break">
                                        {currentWord.en}
                                    </h3>
                                    
                                    {/* Nút phát âm loa */}
                                    <button 
                                        onClick={handleSpeak}
                                        className="w-12 h-12 rounded-full bg-brand-50 hover:bg-brand-100 dark:bg-brand-900/30 dark:hover:bg-brand-900/60 text-brand-600 dark:text-brand-400 flex items-center justify-center transition-all duration-200 active:scale-90"
                                        title="Phát âm từ vựng"
                                    >
                                        <i className="fa-solid fa-volume-high text-lg"></i>
                                    </button>
                                </div>

                                <div className="text-center text-xs text-slate-400 dark:text-slate-500">
                                    Nhấn để xem nghĩa Tiếng Việt
                                </div>
                            </div>

                            {/* MẶT SAU: TIẾNG VIỆT */}
                            <div className="absolute inset-0 bg-gradient-to-tr from-brand-500 to-indigo-600 text-white rounded-3xl p-8 shadow-xl flex flex-col justify-between backface-hidden rotate-y-180">
                                <div className="flex justify-between items-center w-full">
                                    <span className="text-sm font-bold tracking-widest text-brand-200 uppercase">MẶT SAU</span>
                                    {currentWord.type && (
                                        <span className="bg-white/20 text-white text-xs font-bold px-2.5 py-1 rounded-md lowercase">
                                            ({currentWord.type})
                                        </span>
                                    )}
                                </div>

                                <div className="text-center my-auto px-4">
                                    <h4 className="text-2xl sm:text-3xl font-bold leading-relaxed">
                                        {currentWord.vi}
                                    </h4>
                                </div>

                                <div className="text-center text-xs text-brand-200">
                                    Nhấn để xem từ Tiếng Anh
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* BỘ ĐIỀU KHIỂN CHUYỂN THẺ */}
                    <div className="flex items-center gap-6 mt-8 w-full justify-center">
                        <button 
                            onClick={handlePrev}
                            className="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand-500 dark:hover:border-brand-400 text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 flex items-center justify-center shadow-sm transition-all duration-200 hover:-translate-x-1"
                        >
                            <i className="fa-solid fa-arrow-left text-lg"></i>
                        </button>

                        <div className="text-sm font-bold text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/80 px-4 py-2 rounded-2xl">
                            {currentIndex + 1} / {words.length} từ vựng
                        </div>

                        <button 
                            onClick={handleNext}
                            className="w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-brand-500 dark:hover:border-brand-400 text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 flex items-center justify-center shadow-sm transition-all duration-200 hover:translate-x-1"
                        >
                            <i className="fa-solid fa-arrow-right text-lg"></i>
                        </button>
                    </div>

                    {/* THANH TIẾN TRÌNH PROGRESS BAR */}
                    <div className="w-full max-w-sm mt-6 bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-brand-500 transition-all duration-300"
                            style={{ width: `${((currentIndex + 1) / words.length) * 100}%` }}
                        ></div>
                    </div>
                </div>
            );
        }

        // PHẦN 2: LUYỆN TẬP NỐI TỪ TIẾNG ANH VỚI NGHĨA TIẾNG VIỆT CHÍNH XÁC (10 TỪ BẤT KỲ)
        function MatchingSection({ words, unitId }) {
            const [gameWords, setGameWords] = useState([]);
            const [enColumns, setEnColumns] = useState([]);
            const [viColumns, setViColumns] = useState([]);
            
            const [selectedEn, setSelectedEn] = useState(null); // Lưu trữ Object {id, en} đang chọn
            const [selectedVi, setSelectedVi] = useState(null); // Lưu trữ Object {id, vi} đang chọn
            const [matches, setMatches] = useState({}); // Lưu trữ cặp đã đúng: {wordId: true}
            const [incorrectPair, setIncorrectPair] = useState(null); // {enId, viId} lỗi để nháy màu đỏ

            // Khởi tạo trò chơi mới
            const initGame = () => {
                // Lấy 10 từ vựng ngẫu nhiên từ danh sách từ vựng của unit
                const shuffled = [...words].sort(() => 0.5 - Math.random());
                const selectedTen = shuffled.slice(0, Math.min(10, words.length));
                
                // Gán mã định danh duy nhất cho từng từ để kiểm tra nối đúng/sai
                const formattedWords = selectedTen.map((w, index) => ({
                    id: `word-${index}-${Date.now()}`,
                    en: w.en,
                    vi: w.vi
                }));

                setGameWords(formattedWords);
                
                // Trộn riêng cột Tiếng Anh và Tiếng Việt độc lập
                const shuffledEn = [...formattedWords].sort(() => 0.5 - Math.random());
                const shuffledVi = [...formattedWords].sort(() => 0.5 - Math.random());

                setEnColumns(shuffledEn);
                setViColumns(shuffledVi);

                setSelectedEn(null);
                setSelectedVi(null);
                setMatches({});
                setIncorrectPair(null);
            };

            // Khởi chạy khi vào unit hoặc ấn nút reset
            useEffect(() => {
                initGame();
            }, [words, unitId]);

            // Xử lý khi chọn từ tiếng Anh
            const handleSelectEn = (item) => {
                if (matches[item.id]) return; // Từ này đã khớp thành công
                setSelectedEn(item);
                setIncorrectPair(null);

                // Nếu đã chọn một từ Tiếng Việt trước đó, tiến hành so khớp ngay
                if (selectedVi) {
                    checkMatch(item, selectedVi);
                }
            };

            // Xử lý khi chọn từ tiếng Việt
            const handleSelectVi = (item) => {
                if (matches[item.id]) return; // Nghĩa này đã khớp thành công
                setSelectedVi(item);
                setIncorrectPair(null);

                // Nếu đã chọn một từ Tiếng Anh trước đó, tiến hành so khớp ngay
                if (selectedEn) {
                    checkMatch(selectedEn, item);
                }
            };

            // Hàm kiểm tra khớp đúng hay sai
            const checkMatch = (enItem, viItem) => {
                if (enItem.id === viItem.id) {
                    // NỐI ĐÚNG
                    setMatches(prev => ({ ...prev, [enItem.id]: true }));
                    setSelectedEn(null);
                    setSelectedVi(null);
                } else {
                    // NỐI SAI - Nháy đỏ cảnh báo
                    setIncorrectPair({ enId: enItem.id, viId: viItem.id });
                    setSelectedEn(null);
                    setSelectedVi(null);

                    // Xóa trạng thái nháy đỏ sau 800ms
                    setTimeout(() => {
                        setIncorrectPair(null);
                    }, 800);
                }
            };

            const isGameFinished = gameWords.length > 0 && Object.keys(matches).length === gameWords.length;

            return (
                <div className="w-full max-w-4xl mx-auto py-4">
                    {/* Header thông số */}
                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm">
                        <div className="text-center sm:text-left">
                            <h3 className="font-bold text-slate-800 dark:text-slate-100">Trò chơi ghép cặp từ vựng</h3>
                            <p className="text-xs text-slate-500 mt-1">Ghép từ vựng Tiếng Anh (trái) với nghĩa Tiếng Việt tương ứng (phải)</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="bg-brand-50 dark:bg-brand-950 text-brand-700 dark:text-brand-400 font-bold px-4 py-2 rounded-xl text-sm">
                                Tiến độ: {Object.keys(matches).length} / {gameWords.length}
                            </span>
                            <button 
                                onClick={initGame}
                                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-xl text-sm font-semibold transition duration-200 flex items-center gap-1.5"
                            >
                                <i className="fa-solid fa-arrows-rotate"></i> Trộn Lại
                            </button>
                        </div>
                    </div>

                    {/* CỘT GHÉP CẶP */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-10">
                        {/* Cột Tiếng Anh */}
                        <div className="flex flex-col gap-3">
                            <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1 text-center">TIẾNG ANH</h4>
                            {enColumns.map((item) => {
                                const isMatched = matches[item.id];
                                const isSelected = selectedEn && selectedEn.id === item.id;
                                const isIncorrect = incorrectPair && incorrectPair.enId === item.id;

                                let cardClass = "bg-white dark:bg-slate-800 text-slate-800 dark:text-white border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:border-brand-300 dark:hover:border-brand-500";
                                if (isSelected) cardClass = "bg-brand-50 dark:bg-brand-950 text-brand-700 dark:text-brand-300 border-brand-500 scale-[1.02] ring-2 ring-brand-500/20";
                                if (isMatched) cardClass = "bg-emerald-50 dark:bg-emerald-950/40 text-emerald-700 dark:text-emerald-400 border-emerald-500/50 opacity-60 cursor-not-allowed";
                                if (isIncorrect) cardClass = "bg-rose-50 dark:bg-rose-950 text-rose-700 dark:text-rose-400 border-rose-500 animate-shake ring-2 ring-rose-500/20";

                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => handleSelectEn(item)}
                                        disabled={isMatched}
                                        className={`p-4 rounded-xl border text-sm font-bold text-center transition-all duration-200 shadow-sm flex justify-between items-center ${cardClass}`}
                                    >
                                        <span className="truncate">{item.en}</span>
                                        {isMatched && <i className="fa-solid fa-circle-check text-emerald-600 dark:text-emerald-400"></i>}
                                        {isIncorrect && <i className="fa-solid fa-circle-xmark text-rose-600 dark:text-rose-400"></i>}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Cột Tiếng Việt */}
                        <div className="flex flex-col gap-3">
                            <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-1 text-center">TIẾNG VIỆT</h4>
                            {viColumns.map((item) => {
                                const isMatched = matches[item.id];
                                const isSelected = selectedVi && selectedVi.id === item.id;
                                const isIncorrect = incorrectPair && incorrectPair.viId === item.id;

                                let cardClass = "bg-white dark:bg-slate-800 text-slate-800 dark:text-white border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:border-brand-300 dark:hover:border-brand-500";
                                if (isSelected) cardClass = "bg-brand-50 dark:bg-brand-950 text-brand-700 dark:text-brand-300 border-brand-500 scale-[1.02] ring-2 ring-brand-500/20";
                                if (isMatched) cardClass = "bg-emerald-50 dark:bg-emerald-950/40 text-emerald-700 dark:text-emerald-400 border-emerald-500/50 opacity-60 cursor-not-allowed";
                                if (isIncorrect) cardClass = "bg-rose-50 dark:bg-rose-950 text-rose-700 dark:text-rose-400 border-rose-500 animate-shake ring-2 ring-rose-500/20";

                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => handleSelectVi(item)}
                                        disabled={isMatched}
                                        className={`p-4 rounded-xl border text-sm font-semibold text-center transition-all duration-200 shadow-sm flex justify-between items-center ${cardClass}`}
                                    >
                                        <span className="truncate text-left flex-1 mr-2">{item.vi}</span>
                                        {isMatched && <i className="fa-solid fa-circle-check text-emerald-600 dark:text-emerald-400 flex-shrink-0"></i>}
                                        {isIncorrect && <i className="fa-solid fa-circle-xmark text-rose-600 dark:text-rose-400 flex-shrink-0"></i>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* MÀN HÌNH HOÀN THÀNH TRÒ CHƠI */}
                    {isGameFinished && (
                        <div className="mt-8 p-8 bg-gradient-to-tr from-emerald-500 to-teal-600 text-white text-center rounded-3xl shadow-xl animate-bounce">
                            <i className="fa-solid fa-trophy text-5xl mb-4"></i>
                            <h3 className="text-2xl font-black">Xuất Sắc! Hoàn Thành Ghép Cặp</h3>
                            <p className="text-emerald-100 text-sm mt-1 max-w-md mx-auto">Bạn đã nối chính xác toàn bộ 10 từ vựng. Hãy nhấn nút Làm lại dưới đây để xáo trộn bộ từ mới học sâu nhớ lâu!</p>
                            <button 
                                onClick={initGame}
                                className="mt-6 bg-white text-emerald-700 hover:bg-emerald-50 font-extrabold px-6 py-3 rounded-2xl shadow-md transition duration-200 transform hover:scale-105"
                            >
                                <i className="fa-solid fa-repeat"></i> Làm Lại Với Bộ Từ Mới
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // PHẦN 3: BÀI TẬP TRẮC NGHIỆM ĐIỀN TỪ/NGHĨA (10 CÂU HỎI 4 LỰA CHỌN)
        function QuizSection({ words, presetSentences, unitId }) {
            const [questions, setQuestions] = useState([]);
            const [currentAnswers, setCurrentAnswers] = useState({}); // Lưu trữ câu trả lời của học sinh: {qIdx: selectedOption}
            const [quizCompleted, setQuizCompleted] = useState(false);

            // Hàm sinh câu hỏi trắc nghiệm thông minh
            const generateQuiz = () => {
                const totalQuestionsCount = 10;
                let generated = [];

                // Bước 1: Trộn các câu hỏi ngữ cảnh mẫu đã có sẵn cho unit này
                const availablePresets = presetSentences ? [...presetSentences] : [];
                const shuffledPresets = availablePresets.sort(() => 0.5 - Math.random());

                // Sử dụng tối đa các câu hỏi mẫu có sẵn (tối đa là 5 câu để đảm bảo phân bổ đa dạng, còn lại sinh câu hỏi từ vựng)
                const presetSelectionCount = Math.min(6, shuffledPresets.length);
                for (let i = 0; i < presetSelectionCount; i++) {
                    generated.push({
                        type: "sentence",
                        text: shuffledPresets[i].q,
                        correctAnswer: shuffledPresets[i].a,
                        options: [...shuffledPresets[i].options].sort(() => 0.5 - Math.random())
                    });
                }

                // Bước 2: Sinh thêm câu hỏi ghép nghĩa từ vựng cho đến khi đủ 10 câu
                const remainingNeeded = totalQuestionsCount - generated.length;
                // Trộn danh sách từ vựng hiện tại để lấy từ làm câu hỏi
                const shuffledWords = [...words].sort(() => 0.5 - Math.random());
                
                // Lọc bỏ những từ đã được dùng làm đáp án đúng trong câu hỏi mẫu để tránh lặp trùng
                const usedAnswers = generated.map(q => q.correctAnswer);
                const unusedWords = shuffledWords.filter(w => !usedAnswers.includes(w.en));

                const wordsForQuiz = unusedWords.slice(0, remainingNeeded);

                wordsForQuiz.forEach((word) => {
                    // Tạo câu hỏi định nghĩa ngẫu nhiên theo 2 dạng: 
                    // Dạng A: Từ tiếng Anh -> Chọn nghĩa tiếng Việt
                    // Dạng B: Định nghĩa tiếng Việt -> Chọn từ tiếng Anh tương ứng
                    const isEnToViType = Math.random() > 0.5;

                    if (isEnToViType) {
                        // Tìm 3 đáp án sai (distractors) từ danh sách từ vựng của unit đó
                        const distractors = words
                            .filter(w => w.en !== word.en)
                            .sort(() => 0.5 - Math.random())
                            .slice(0, 3)
                            .map(w => w.vi);

                        const options = [word.vi, ...distractors].sort(() => 0.5 - Math.random());

                        generated.push({
                            type: "define-vi",
                            text: `Từ vựng "${word.en}" trong tiếng Việt có nghĩa là gì?`,
                            correctAnswer: word.vi,
                            options: options
                        });
                    } else {
                        const distractors = words
                            .filter(w => w.en !== word.en)
                            .sort(() => 0.5 - Math.random())
                            .slice(0, 3)
                            .map(w => w.en);

                        const options = [word.en, ...distractors].sort(() => 0.5 - Math.random());

                        generated.push({
                            type: "define-en",
                            text: `Từ tiếng Anh nào mang nghĩa: "${word.vi}"?`,
                            correctAnswer: word.en,
                            options: options
                        });
                    }
                });

                // Xáo trộn lại toàn bộ 10 câu hỏi để lẫn lộn giữa trắc nghiệm điền câu và giải nghĩa
                setQuestions(generated.sort(() => 0.5 - Math.random()).slice(0, 10));
                setCurrentAnswers({});
                setQuizCompleted(false);
            };

            // Khởi chạy khi khởi tạo Unit hoặc nhấn nút làm lại
            useEffect(() => {
                generateQuiz();
            }, [words, presetSentences, unitId]);

            // Học sinh chọn đáp án
            const handleSelectOption = (qIdx, option) => {
                // Nếu đã chọn rồi thì không cho phép chọn lại để đảm bảo tính minh bạch kết quả tức thì
                if (currentAnswers[qIdx] !== undefined) return;

                setCurrentAnswers(prev => {
                    const next = { ...prev, [qIdx]: option };
                    
                    // Nếu đã hoàn thành tất cả 10 câu, kích hoạt màn hình tổng kết sau 1 giây
                    if (Object.keys(next).length === 10) {
                        setTimeout(() => {
                            setQuizCompleted(true);
                        }, 1000);
                    }
                    return next;
                });
            };

            const calculateScore = () => {
                let score = 0;
                questions.forEach((q, idx) => {
                    if (currentAnswers[idx] === q.correctAnswer) {
                        score++;
                    }
                });
                return score;
            };

            return (
                <div className="w-full max-w-3xl mx-auto py-4">
                    {/* Header chỉ số */}
                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm">
                        <div className="text-center sm:text-left">
                            <h3 className="font-bold text-slate-800 dark:text-slate-100">Luyện tập trắc nghiệm thông minh</h3>
                            <p className="text-xs text-slate-500 mt-1">Đánh giá độ hiểu sâu của bạn qua 10 câu hỏi đa dạng kiến thức.</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="bg-brand-50 dark:bg-brand-950 text-brand-700 dark:text-brand-400 font-bold px-4 py-2 rounded-xl text-sm">
                                Đã trả lời: {Object.keys(currentAnswers).length} / 10
                            </span>
                            <button 
                                onClick={generateQuiz}
                                className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-xl text-sm font-semibold transition duration-200 flex items-center gap-1.5"
                            >
                                <i className="fa-solid fa-arrows-rotate"></i> Tạo Đề Mới
                            </button>
                        </div>
                    </div>

                    {/* DANH SÁCH 10 CÂU HỎI */}
                    <div className="space-y-6">
                        {questions.map((q, idx) => {
                            const userAnswer = currentAnswers[idx];
                            const isAnswered = userAnswer !== undefined;

                            return (
                                <div 
                                    key={idx} 
                                    className={`p-6 rounded-2xl bg-white dark:bg-slate-900 border transition-all duration-300 shadow-sm ${
                                        isAnswered 
                                        ? (userAnswer === q.correctAnswer ? "border-emerald-200 dark:border-emerald-800/40" : "border-rose-200 dark:border-rose-800/40")
                                        : "border-slate-100 dark:border-slate-800"
                                    }`}
                                >
                                    {/* Tiêu đề câu hỏi */}
                                    <div className="flex items-start gap-3 mb-4">
                                        <span className="w-6 h-6 flex items-center justify-center rounded-lg bg-brand-50 dark:bg-brand-950 text-brand-600 dark:text-brand-400 text-xs font-bold mt-0.5">
                                            {idx + 1}
                                        </span>
                                        <h4 className="text-base font-semibold text-slate-800 dark:text-slate-100">
                                            {q.text}
                                        </h4>
                                    </div>

                                    {/* Mạng lưới 4 đáp án */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {q.options.map((option, oIdx) => {
                                            const isSelected = userAnswer === option;
                                            const isCorrect = option === q.correctAnswer;
                                            
                                            let btnClass = "border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/60 hover:border-brand-400 dark:hover:border-brand-500";
                                            let icon = null;

                                            if (isAnswered) {
                                                if (isCorrect) {
                                                    // Đáp án đúng luôn sáng xanh lá
                                                    btnClass = "bg-emerald-50 dark:bg-emerald-950/40 text-emerald-800 dark:text-emerald-300 border-emerald-500 font-bold";
                                                    icon = <i className="fa-solid fa-circle-check text-emerald-600 dark:text-emerald-400 text-base"></i>;
                                                } else if (isSelected) {
                                                    // Nếu học sinh chọn sai, đáp án sai sáng đỏ
                                                    btnClass = "bg-rose-50 dark:bg-rose-950/40 text-rose-800 dark:text-rose-300 border-rose-500 font-bold";
                                                    icon = <i className="fa-solid fa-circle-xmark text-rose-600 dark:text-rose-400 text-base"></i>;
                                                } else {
                                                    btnClass = "opacity-50 border-slate-200 dark:border-slate-800 text-slate-400 dark:text-slate-500 cursor-not-allowed";
                                                }
                                            }

                                            return (
                                                <button
                                                    key={oIdx}
                                                    onClick={() => handleSelectOption(idx, option)}
                                                    disabled={isAnswered}
                                                    className={`p-3 px-4 rounded-xl border text-sm text-left transition-all duration-200 flex justify-between items-center ${btnClass}`}
                                                >
                                                    <span>{option}</span>
                                                    {icon}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* MÀN HÌNH TỔNG KẾT ĐIỂM SỐ */}
                    {quizCompleted && (
                        <div className="mt-8 p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-center rounded-3xl shadow-xl max-w-xl mx-auto">
                            <i className="fa-solid fa-star text-amber-400 text-5xl mb-4 animate-spin-slow"></i>
                            <h3 className="text-2xl font-black text-slate-800 dark:text-white">Hoàn Thành Bài Kiểm Tra!</h3>
                            <div className="text-4xl font-black text-brand-600 dark:text-brand-400 my-4">
                                {calculateScore()} / 10 câu đúng
                            </div>
                            
                            {/* Phân loại khuyến khích học sinh */}
                            <p className="text-slate-600 dark:text-slate-400 text-sm max-w-md mx-auto">
                                {calculateScore() === 10 
                                    ? "Thật phi thường! Bạn đã đạt điểm số tuyệt đối. Toàn bộ từ vựng đã được bạn ghi nhớ xuất sắc." 
                                    : calculateScore() >= 8 
                                    ? "Tuyệt vời! Bạn nắm vững hầu hết các từ vựng cốt lõi. Hãy kiên trì duy trì phong độ nhé."
                                    : "Khá tốt! Đừng nản chí, hãy nhấn nút làm lại để xáo trộn câu hỏi và cải thiện điểm số tốt hơn nữa."}
                            </p>

                            <button 
                                onClick={generateQuiz}
                                className="mt-6 bg-brand-600 hover:bg-brand-700 text-white font-extrabold px-6 py-3 rounded-2xl shadow-md shadow-brand-500/20 transition duration-200 transform hover:scale-105"
                            >
                                <i className="fa-solid fa-repeat"></i> Làm Đề Trắc Nghiệm Mới
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
